<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Checkout</h1>
        <nav>
            <ul>
                <li><a href="landing.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="account.html">Account</a></li>
                <li><a href="signup.html">Sign Up</a></li>
            </ul>
        </nav>
    </header>

    <div class="checkout-container">
        <section>
            <!-- Task 4: Form with validation -->
            <form id="checkout-form">
                <fieldset>
                    <legend>Shipping Address</legend>

                    <div class="form-group">
                        <label>Full Name:</label>
                        <input type="text" id="name">
                        <span class="error-message" id="name-error"></span>
                    </div>

                    <div class="form-group">
                        <label>Street Address:</label>
                        <input type="text" id="street">
                        <span class="error-message" id="street-error"></span>
                    </div>
                    
                    <div class="form-group">
                        <label>Zip Code:</label>
                        <input type="text" id="zipcode">
                        <span class="error-message" id="zipcode-error"></span>
                    </div>

                    <div class="form-group">
                        <label>Barangay:</label>
                        <input type="text" id="barangay">
                        <span class="error-message" id="barangay-error"></span>
                    </div>

                    <div class="form-group">
                        <label>Province:</label>
                        <input type="text" id="province">
                        <span class="error-message" id="province-error"></span>
                    </div>

                    <div class="form-group">
                        <label>Payment Method:</label><br>
                        <label><input type="radio" name="payment" value="gcash"> Gcash</label><br>
                        <label><input type="radio" name="payment" value="credit-card"> Credit Card</label><br>
                        <label><input type="radio" name="payment" value="cod"> Cash on Delivery</label>
                        <span class="error-message" id="payment-error"></span>
                    </div>
                </fieldset>

                <button type="submit">Place Order</button>
            </form>
        </section>

        <aside>
    <h2>Order Summary</h2>
    <p>Items: <span id="item-count">0</span></p>
    <p>Total: <span id="order-total">0</span></p>
</aside>

    <script src="script.js"></script>
</body>
</html>
